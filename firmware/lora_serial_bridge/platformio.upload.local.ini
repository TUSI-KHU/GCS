; Temporary local upload config for building this bridge from the GCS folder.
; Keep the checked-in platformio.ini generic; this file points back to the
; sibling avionics repo where board_pinmap.h and protocol headers live.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps =
  sandeepmistry/LoRa@^0.8.0
  Wire
build_flags =
  -I../../../2026-nura-avionics/include
  -I../../../2026-nura-avionics/protocol/include
