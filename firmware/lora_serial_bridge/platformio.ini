; NURA LoRa 시리얼 브리지 빌드 설정 (Teensy 4.1)
;
; 설치: 이 lora_serial_bridge 폴더를 2026-nura-avionics-main/ 레포 루트에
;       (receiver/, sender/ 폴더와 같은 위치에) 둔 다음:
;          pio run -d lora_serial_bridge -t upload
;
; build_flags 의 -I 경로는 receiver/platformio.ini 와 동일하게 맞춰져 있음.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
lib_deps =
  sandeepmistry/LoRa@^0.8.0
  Wire
build_flags =
  -I../../../2026-nura-avionics/include
  -I../../../2026-nura-avionics/protocol/include

; 현재 지상국: SparkFun LoRa 1W Breakout SPX-18572 / E19-915M30S.
; 최종 avionics board_pinmap.h와 같은 SPI1, CS=9, RST=24, DIO0=32,
; RXEN=30, TXEN=31 배선을 사용한다. run_ground_station.sh 기본 환경이다.
[env:sx1276_ground]
extends = env:teensy41
build_flags =
  ${env:teensy41.build_flags}
  -D NURA_SPARKFUN_1W_SX1276=1

; 이전 지상국 하네스 보존용. 신규 SparkFun 1W 배선에는 사용하지 않는다.
[env:sx1276_ground_legacy_spi0]
extends = env:teensy41
build_flags =
  ${env:teensy41.build_flags}
  -D NURA_GROUND_SX1276_LEGACY_SPI0=1

[env:dev_sx1278]
extends = env:teensy41
build_flags =
  ${env:teensy41.build_flags}
  -D NURA_DEV_SX1278=1

[env:lr900f_teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
build_flags =
  -I../../../2026-nura-avionics/protocol/include
  -D NURA_LR900F_UART_BRIDGE=1
